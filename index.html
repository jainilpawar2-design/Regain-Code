<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="description" content="A minimal in-browser coding session stopwatch." />
        <title>Regain Code Timer - Step 1</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <main class="wrap">
            <section class="card">
                <p class="eyebrow">Step 1</p>
                <h1>Basic Coding Timer</h1>
                <p class="copy">A simple stopwatch for coding sessions.</p>
                <div class="timer" id="timerDisplay">00:00:00</div>
                <p class="status" id="timerSub">Ready to start.</p>
                <div class="actions">
                    <button id="startBtn" type="button">Start</button>
                    <button id="pauseBtn" type="button">Pause</button>
                    <button id="resetBtn" type="button">Reset</button>
                </div>
            </section>
        </main>
        <script src="app.js"></script>
    </body>
    </html>
